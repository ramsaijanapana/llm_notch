name: Publish signed macOS installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag; defaults to app-v<tauri version>
        required: false
        type: string
  push:
    tags:
      - 'app-v*'

concurrency:
  group: signed-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  relay-sidecars:
    name: Relay sidecar (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: npm run native:prepare-relay -- --target ${{ matrix.target }}

      - name: Verify relay sidecar artifact
        shell: bash
        run: |
          set -euo pipefail
          sidecar="src-tauri/binaries/llm-notch-relay-${{ matrix.target }}"
          test -f "$sidecar"

      - uses: actions/upload-artifact@v4
        with:
          name: relay-sidecar-${{ matrix.target }}
          path: src-tauri/binaries/llm-notch-relay-${{ matrix.target }}
          if-no-files-found: error

  # Always runs so Actions shows an honest blocked/ready status without claiming signed artifacts.
  signing-readiness:
    name: macOS signing readiness
    runs-on: ubuntu-latest
    outputs:
      signed: ${{ steps.report.outputs.signed }}

    steps:
      - name: Report required Apple secrets
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
          HAS_CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
          HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
          HAS_APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD != '' }}
          HAS_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' }}
        run: |
          missing=()
          [ "$HAS_CERT" != "true" ] && missing+=("APPLE_CERTIFICATE_BASE64")
          [ "$HAS_CERT_PASSWORD" != "true" ] && missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ "$HAS_APPLE_ID" != "true" ] && missing+=("APPLE_ID")
          [ "$HAS_APPLE_ID_PASSWORD" != "true" ] && missing+=("APPLE_ID_PASSWORD")
          [ "$HAS_TEAM_ID" != "true" ] && missing+=("APPLE_TEAM_ID")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::notice title=macOS signing blocked::Missing repository secrets: ${missing[*]}. See scripts/signing/README.md."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::notice title=macOS signing ready::All APPLE_* repository secrets are configured."
          echo "signed=true" >> "$GITHUB_OUTPUT"
        id: report

  signed-macos:
    name: Signed ${{ matrix.label }} DMG
    needs: [signing-readiness, relay-sidecars]
    if: needs.signing-readiness.outputs.signed == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            target: aarch64-apple-darwin
          - label: Intel
            target: x86_64-apple-darwin
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KEYCHAIN_PATH: ${{ runner.temp }}/llm-notch-signing.keychain-db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Require signing credentials
        run: |
          missing=()
          [ -z "$APPLE_CERTIFICATE_BASE64" ] && missing+=("APPLE_CERTIFICATE_BASE64")
          [ -z "$APPLE_CERTIFICATE_PASSWORD" ] && missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ -z "$APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$APPLE_ID_PASSWORD" ] && missing+=("APPLE_ID_PASSWORD")
          [ -z "$APPLE_TEAM_ID" ] && missing+=("APPLE_TEAM_ID")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Protected Apple signing secrets are required: ${missing[*]}" >&2
            exit 1
          fi

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          pattern: relay-sidecar-*
          path: src-tauri/binaries
          merge-multiple: true

      - name: Import Developer ID certificate
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

      - name: Resolve codesign identity
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found in imported keychain." >&2
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Using codesign identity: $IDENTITY"

      - name: Prepare bundled helper
        run: npm run native:prepare-helper -- --target ${{ matrix.target }}

      - name: Build unsigned DMG for signing gate
        env:
          LLM_NOTCH_SKIP_HELPER_BUILD: '1'
          # Ad-hoc signing keeps the bundle buildable in CI; release gate re-signs with Developer ID.
          APPLE_SIGNING_IDENTITY: '-'
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles dmg

      - name: Locate app and DMG artifacts
        run: |
          APP_PATH=$(find "./target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' -print -quit)
          DMG_PATH=$(find "./target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -name '*.dmg' -print -quit)
          if [ -z "$APP_PATH" ] || [ -z "$DMG_PATH" ]; then
            echo "Expected .app and .dmg under target/${{ matrix.target }}/release/bundle" >&2
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "App: $APP_PATH"
          echo "DMG: $DMG_PATH"

      - name: Sign, notarize, and staple
        run: ./scripts/signing/notarize-macos.sh "$APP_PATH" "$DMG_PATH"

      - name: Verify distributable signature
        run: |
          codesign --verify --deep --strict "$APP_PATH"
          spctl --assess --type open --context context:primary-signature -v "$DMG_PATH"

      - name: Resolve release tag
        run: |
          version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="app-v${version}"
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "Release tag: $tag"

      - name: Create draft release if missing
        run: |
          version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --draft --title "LLM Notch v${version}" \
              --notes 'Signed macOS installers (Developer ID + notarization). Windows publication uses .github/workflows/release-windows-signed.yml.'
          fi

      - name: Upload signed DMG to draft release
        run: gh release upload "$RELEASE_TAG" "$DMG_PATH" --clobber
