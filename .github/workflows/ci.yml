name: CI

on:
  push:
    branches: [main, master, 'feat/**']
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-fmt-check:
    name: Rust fmt / check / test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:prepare-helper
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --all-targets
      - run: cargo test --workspace --lib --exclude llm-notch-desktop
      - run: cargo test -p llm-notch-desktop --lib
        env:
          RUSTFLAGS: "-C link-arg=/MANIFEST:EMBED -C link-arg=/MANIFESTINPUT=${{ github.workspace }}/src-tauri/windows-test.manifest.xml"
      - run: cargo test -p llm-notch-desktop --test native_windows
        env:
          RUSTFLAGS: "-C link-arg=/MANIFEST:EMBED -C link-arg=/MANIFESTINPUT=${{ github.workspace }}/src-tauri/windows-test.manifest.xml"

  rust-macos:
    name: Rust check / test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:prepare-helper
      - run: cargo check --workspace --all-targets
      - run: cargo test --workspace --lib --exclude llm-notch-desktop
      - run: cargo test -p llm-notch-desktop --lib
      - run: cargo test -p llm-notch-desktop --test native_macos

  frontend:
    name: Typecheck / lint / unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:run

  playwright:
    name: Playwright (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            project: chromium
          - browser: webkit
            project: webkit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npx playwright test --project=${{ matrix.project }}

  tauri-build-windows:
    name: Tauri build smoke (Windows)
    runs-on: windows-latest
    needs: [rust-fmt-check, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:prepare-helper
      - run: npm run native:check

  tauri-build-macos:
    name: Tauri build smoke (macOS)
    runs-on: macos-latest
    needs: [rust-macos, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:prepare-helper
      - run: npm run native:check

  release-gates:
    name: Release gate docs (unsigned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify signing scaffold exists
        run: |
          test -f scripts/signing/README.md
          test -f scripts/signing/sign-windows.ps1
          test -f scripts/signing/notarize-macos.sh
          test -f docs/platform/release-gates.md
          grep -q "externalBin" src-tauri/tauri.conf.json
          grep -q "llm-notch-hook" src-tauri/tauri.conf.json
          grep -q "llm-notch-relay" src-tauri/tauri.conf.json
          grep -q "\-\-relay-only" scripts/prepare-native-helper.mjs

  relay-sidecar-matrix:
    name: Relay sidecar (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build relay sidecar (unsigned)
        run: npm run native:prepare-relay -- --target ${{ matrix.target }}
      - name: Verify sidecar path matches deploy resolver
        shell: bash
        run: |
          set -euo pipefail
          sidecar="src-tauri/binaries/llm-notch-relay-${{ matrix.target }}"
          test -f "$sidecar"
          test -x "$sidecar"
          cargo test -p notch-remote -- relay_artifact

